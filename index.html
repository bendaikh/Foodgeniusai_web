<!DOCTYPE html>
<html>
<head>
  <base href="/">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="GourmetAI - AI-powered recipe generation and culinary inspiration">
  
  <!-- Performance optimizations -->
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  
  <!-- Preconnect to external resources -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preconnect" href="https://firebasestorage.googleapis.com">
  
  <!-- DNS prefetch for Firebase services -->
  <link rel="dns-prefetch" href="https://www.gstatic.com">
  <link rel="dns-prefetch" href="https://firebaseinstallations.googleapis.com">
  <link rel="dns-prefetch" href="https://identitytoolkit.googleapis.com">
  
  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="GourmetAI">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>GourmetAI - AI-Powered Recipe Generation</title>
  <link rel="manifest" href="manifest.json">
  
  <!-- Loading styles for better UX -->
  <style>
    body {
      margin: 0;
      padding: 0;
      background-color: #0A0E27;
      overflow: hidden;
    }
    
    #loading {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background-color: #0A0E27;
      z-index: 9999;
    }
    
    #loading-text {
      color: #00D9A5;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 24px;
      font-weight: 600;
      margin-bottom: 20px;
    }
    
    .spinner {
      width: 50px;
      height: 50px;
      border: 4px solid rgba(0, 217, 165, 0.1);
      border-top-color: #00D9A5;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    
    @media (prefers-reduced-motion: reduce) {
      .spinner {
        animation: none;
        border-top-color: #00D9A5;
      }
    }
  </style>
</head>
<body>
  <!-- Loading indicator -->
  <div id="loading">
    <div id="loading-text">GourmetAI</div>
    <div class="spinner"></div>
  </div>
  
  <!-- Flutter entry point with deferred loading -->
  <script>
    window.addEventListener('load', function() {
      // Remove loading screen once Flutter is ready
      _flutter.loader.loadEntrypoint({
        onEntrypointLoaded: async function(engineInitializer) {
          const appRunner = await engineInitializer.initializeEngine({
            renderer: "canvaskit",
            canvasKitMaximumSurfaces: 4,
            canvasKitForceCpuOnly: false,
          });
          await appRunner.runApp();
          
          // Hide loading screen with fade out
          const loadingEl = document.getElementById('loading');
          if (loadingEl) {
            loadingEl.style.transition = 'opacity 0.3s';
            loadingEl.style.opacity = '0';
            setTimeout(() => {
              loadingEl.style.display = 'none';
            }, 300);
          }
        }
      });
    });
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
